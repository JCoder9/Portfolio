<div class="projects-section">
  <h1>Projects</h1>
  <p class="section-intro">Explore some of my recent work and projects.</p>
  
  <!-- Category Filter -->
  <div class="filter-container">
    <!-- Mobile Filter Toggle -->
    <button class="mobile-filter-toggle" (click)="toggleFilters()">
      <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
        <path d="M22 3H2l8 9.46V19l4 2v-8.54L22 3z"></path>
      </svg>
      <span>{{ selectedCategory.name }}</span>
      <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" [class.rotated]="isFiltersExpanded">
        <polyline points="6,9 12,15 18,9"></polyline>
      </svg>
    </button>
    
    <!-- Filter Buttons -->
    <div class="category-filters" [class.expanded]="isFiltersExpanded">
      <button 
        *ngFor="let category of categories" 
        [class.active]="selectedCategory.name === category.name"
        (click)="filterByCategory(category)"
        class="category-button"
      >
        <img [src]="category.icon" [alt]="category.name" class="category-icon">
        <span>{{ category.name }}</span>
      </button>
    </div>
  </div>
  
  <div class="projects-grid">
    <div *ngFor="let project of projects" class="project-card">
      <div class="project-image">
        <img 
          *ngIf="project.images && project.images.length > 0; else placeholderIcon"
          [src]="project.images[0]" 
          [alt]="project.title"
          class="project-thumbnail"
        />
        <ng-template #placeholderIcon>
          <div class="placeholder-image">📁</div>
        </ng-template>
      </div>
      <div class="project-content">
        <h3>{{ project.title }}</h3>
        <p class="project-description">{{ project.overview | slice:0:150 }}{{ project.overview.length > 150 ? '...' : '' }}</p>
        <div class="project-category" *ngIf="project.category">
          <span class="category-badge">{{ project.category.name }}</span>
        </div>
        <div class="project-links">
          <a [routerLink]="['/projects', project.slug]" class="project-link">View Details</a>
          <a 
            *ngIf="project.link" 
            [href]="project.link" 
            class="project-link"
            target="_blank"
            rel="noopener"
          >
            <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" style="vertical-align: middle; margin-right: 4px;">
              <path d="M18 13v6a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2V8a2 2 0 0 1 2-2h6"></path>
              <polyline points="15 3 21 3 21 9"></polyline>
              <line x1="10" y1="14" x2="21" y2="3"></line>
            </svg>
            External Link
          </a>
          <a 
            *ngIf="project.githubLink" 
            [href]="project.githubLink" 
            class="project-link"
            target="_blank"
            rel="noopener"
          >
            <svg width="16" height="16" viewBox="0 0 24 24" fill="currentColor" style="vertical-align: middle; margin-right: 4px;">
              <path d="M12 0c-6.626 0-12 5.373-12 12 0 5.302 3.438 9.8 8.207 11.387.599.111.793-.261.793-.577v-2.234c-3.338.726-4.033-1.416-4.033-1.416-.546-1.387-1.333-1.756-1.333-1.756-1.089-.745.083-.729.083-.729 1.205.084 1.839 1.237 1.839 1.237 1.07 1.834 2.807 1.304 3.492.997.107-.775.418-1.305.762-1.604-2.665-.305-5.467-1.334-5.467-5.931 0-1.311.469-2.381 1.236-3.221-.124-.303-.535-1.524.117-3.176 0 0 1.008-.322 3.301 1.23.957-.266 1.983-.399 3.003-.404 1.02.005 2.047.138 3.006.404 2.291-1.552 3.297-1.23 3.297-1.23.653 1.653.242 2.874.118 3.176.77.84 1.235 1.911 1.235 3.221 0 4.609-2.807 5.624-5.479 5.921.43.372.823 1.102.823 2.222v3.293c0 .319.192.694.801.576 4.765-1.589 8.199-6.086 8.199-11.386 0-6.627-5.373-12-12-12z"/>
            </svg>
            GitHub
          </a>
        </div>
      </div>
    </div>
  </div>
</div>
